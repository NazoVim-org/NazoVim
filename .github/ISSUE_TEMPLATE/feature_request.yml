name: "✨ Feature Request / 機能追加要望"
description: "Suggest a new feature or improvement / 新機能・改善の提案"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request / 機能追加要望
        Describe the feature you'd like to see.  
        欲しい機能・改善点を教えてください。

  - type: textarea
    id: motivation
    attributes:
      label: "Motivation / 背景・動機"
      description: |
        What problem are you trying to solve? / どんな問題を解決したいですか？
      placeholder: |
        e.g. I often need to jump between test and implementation files, but there's no quick way to do it.
        例: テストファイルと実装ファイルを素早く切り替えたいが、今の設定では手間がかかる。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "Proposed Solution / 提案内容"
      description: |
        How would you like it to work? / どう動いてほしいですか？
      placeholder: |
        e.g. Add a keymap `<leader>at` that toggles between `foo.ts` and `foo.test.ts`.
        例: `<leader>at` で `foo.ts` ↔ `foo.test.ts` を切り替えるキーマップを追加する。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered / 検討した代替案"
      description: |
        Any other approaches you considered? / 他に検討した方法はありますか？
      placeholder: |
        e.g. Using a plugin like vim-projectionist, but it felt too heavy.
        例: vim-projectionist を使うことも検討したが、重すぎると感じた。

  - type: textarea
    id: additional
    attributes:
      label: "Additional Context / その他"
      description: |
        Any references, screenshots, or related issues? / 参考リンク・スクリーンショット・関連Issueなど。
